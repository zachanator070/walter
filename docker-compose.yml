services:
  walter:
    build: .
    restart: unless-stopped
    env_file: .env

    privileged: true
    devices:
      # ALSA audio hardware (mic + speaker)
      - /dev/snd:/dev/snd
      # PTT keyboard — reads PTT_INPUT_DEVICE from .env
      - ${PTT_INPUT_DEVICE}:${PTT_INPUT_DEVICE}

    # Add container process to the host audio and input groups.
    # Find the correct GIDs on your Pi:
    #   getent group audio   (typically 29)
    #   getent group input   (typically 107)
    group_add:
      - "29"   # audio
      - "107"  # input

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
